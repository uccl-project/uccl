name: UCCL Build & Test (L4)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [labeled, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr:
        description: PR number to benchmark
        required: true
      sha:
        description: PR head commit SHA to benchmark
        required: true
      head_repo:
        description: PR head repository, for example owner/repo
        required: true
      benchmark:
        description: Benchmark target name for PR comment write-back
        required: false
        default: l4
      reply_comment_id:
        description: PR comment ID to update with benchmark result
        required: false
        default: ""
      reply_marker:
        description: Marker used to identify the benchmark reply comment
        required: false
        default: ""

concurrency:
  group: l4-uccl-build
  cancel-in-progress: false

jobs:
  mark-running:
    if: github.event_name == 'workflow_dispatch' && inputs.reply_comment_id != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout workflow helpers
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Update benchmark comment with run URL
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPLY_COMMENT_ID: ${{ inputs.reply_comment_id }}
          REPLY_MARKER: ${{ inputs.reply_marker }}
          BENCHMARK_PR: ${{ inputs.pr }}
          BENCHMARK_SHA: ${{ inputs.sha }}
          BENCHMARK_NAME: ${{ inputs.benchmark }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 .github/workflows/benchmark_comment.py \
            --mode update \
            --comment-id "$REPLY_COMMENT_ID" \
            --marker "$REPLY_MARKER" \
            --pr "$BENCHMARK_PR" \
            --sha "$BENCHMARK_SHA" \
            --benchmark "$BENCHMARK_NAME" \
            --status running \
            --workflow-url "$WORKFLOW_URL"

  build-on-l4:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      contains(github.event.pull_request.labels.*.name, 'run-benchmark'))
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout (for artifacts/consistency)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event_name == 'workflow_dispatch' && inputs.head_repo || github.repository }}
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.sha || github.sha }}
          persist-credentials: false

      - name: Setup SSH for l4-sky-test-01
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "${{ secrets.L4_SSH_KEY }}" > ~/.ssh/l4_key
          chmod 600 ~/.ssh/l4_key

          cat >> ~/.ssh/config <<EOF
          Host l4-sky-test-01
            HostName "${{ secrets.UCCL_DEV_L4_HOST0 }}"
            User skytestuser
            IdentityFile ~/.ssh/l4_key
            IdentitiesOnly yes
          EOF

          ssh-keyscan -H "${{ secrets.UCCL_DEV_L4_HOST0 }}" >> ~/.ssh/known_hosts

      - name: Install CXI system dependencies on l4
        shell: bash
        run: |
          set -euo pipefail
          ssh -o BatchMode=yes l4-sky-test-01 bash -s << 'EOF'
            set -euo pipefail
            sudo -n apt-get update
            sudo -n apt-get install -y libfabric-dev libhwloc-dev
          EOF

      - name: Sync PR code to remote
        shell: bash
        run: |
          set -euo pipefail
          git submodule update --init --recursive thirdparty/nccl
          rsync -az --exclude .venv --exclude .git --delete \
            -e "ssh -o BatchMode=yes" \
            ./ep ./collective/rdma ./p2p \
            ./ l4-sky-test-01:/home/skytestuser/uccl-test/

      - name: Build & verify UCCL on remote
        shell: bash
        run: |
          set -euo pipefail
          ssh -o BatchMode=yes l4-sky-test-01 'bash -lc "
            set -euo pipefail

            # Explicitly load the right conda init
            source \$HOME/miniconda3/etc/profile.d/conda.sh

            if ! command -v conda >/dev/null 2>&1; then
              echo \"conda not found even after sourcing\" >&2
              exit 1
            fi

            # Create env if missing
            conda info --envs | awk \x27{print \$1}\x27 | grep -qx uccl || conda create -y -n uccl python=3.12
            conda activate uccl

            cd /home/skytestuser/uccl-test
            TORCH_CUDA_ARCH_LIST="9.0" ./build.sh cu12 all 3.12 --install 2>&1 | tee build.log

            grep -q \"Successfully installed uccl-\" build.log
          "'

      - name: Fetch remote build.log
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          scp -o BatchMode=yes l4-sky-test-01:/home/skytestuser/uccl-test/build.log ./build.log || true

      - name: Upload build.log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-l4
          path: build.log

  write-back-result:
    needs: [mark-running, build-on-l4]
    if: always() && github.event_name == 'workflow_dispatch' && inputs.reply_comment_id != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout workflow helpers
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Update benchmark comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPLY_COMMENT_ID: ${{ inputs.reply_comment_id }}
          REPLY_MARKER: ${{ inputs.reply_marker }}
          BENCHMARK_PR: ${{ inputs.pr }}
          BENCHMARK_SHA: ${{ inputs.sha }}
          BENCHMARK_NAME: ${{ inputs.benchmark }}
          BENCHMARK_RESULT: ${{ needs.build-on-l4.result }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 .github/workflows/benchmark_comment.py \
            --mode update \
            --comment-id "$REPLY_COMMENT_ID" \
            --marker "$REPLY_MARKER" \
            --pr "$BENCHMARK_PR" \
            --sha "$BENCHMARK_SHA" \
            --benchmark "$BENCHMARK_NAME" \
            --status "$BENCHMARK_RESULT" \
            --result "$BENCHMARK_RESULT" \
            --workflow-url "$WORKFLOW_URL"
