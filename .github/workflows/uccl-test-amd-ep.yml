name: UCCL EP Test (AMD)

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [labeled, synchronize, reopened]

concurrency:
  group: amd-ci-hosts-${{ github.ref }}
  cancel-in-progress: false

jobs:
  setup-and-build:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
      contains(github.event.pull_request.labels.*.name, 'run-benchmark'))
    uses: ./.github/workflows/uccl-build-amd.yml
    with:
      build_type: ep
    secrets: inherit

  ep-test:
    needs: setup-and-build
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
      contains(github.event.pull_request.labels.*.name, 'run-benchmark'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15

    steps:
      - name: Setup SSH for AMD hosts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "${{secrets.UCCL_DEV_SSH_KEY}}" > ~/.ssh/uccl-dev
          chmod 600 ~/.ssh/uccl-dev

          cat >> ~/.ssh/config << 'EOF'
          Host amd0
              HostName "${{secrets.UCCL_DEV_AMD_HOST0}}"
              User "${{secrets.UCCL_DEV_AMD_USER}}"
              IdentityFile ~/.ssh/uccl-dev
              IdentitiesOnly yes

          Host amd1
              HostName "${{secrets.UCCL_DEV_AMD_HOST1}}"
              User "${{secrets.UCCL_DEV_AMD_USER}}"
              IdentityFile ~/.ssh/uccl-dev
              IdentitiesOnly yes
          EOF

          ssh-keyscan -H "${{secrets.UCCL_DEV_AMD_HOST0}}" >> ~/.ssh/known_hosts
          ssh-keyscan -H "${{secrets.UCCL_DEV_AMD_HOST1}}" >> ~/.ssh/known_hosts

      - name: Run EP high-throughput test
        timeout-minutes: 3
        shell: bash
        run: |
          set -uo pipefail

          ssh -o BatchMode=yes amd0 bash --norc --noprofile << 'EOF' &
            set -euo pipefail
            bash ~/uccl-ci-sandbox/.github/workflows/amd_ensure_idle_gpu.sh
            bash ~/uccl-ci-sandbox/.github/workflows/amd_ensure_ci_venv.sh
            source ~/uccl-ci-sandbox/.github/workflows/amd_set_env.sh
            source ~/uccl-ci-sandbox/.venv/bin/activate
            export PYTHONUNBUFFERED=1
            cd ~/uccl-ci-sandbox/ep/bench
            ./run_ep.sh 2 0 ht ${{secrets.UCCL_DEV_AMD_HOST0}} 2>&1 | stdbuf -oL tee ~/uccl-ci-sandbox/ep-ht-host0.log
          EOF
          PID0=$!

          sleep 2

          ssh -o BatchMode=yes amd1 bash --norc --noprofile << 'EOF' &
            set -euo pipefail
            bash ~/uccl-ci-sandbox/.github/workflows/amd_ensure_idle_gpu.sh
            bash ~/uccl-ci-sandbox/.github/workflows/amd_ensure_ci_venv.sh
            source ~/uccl-ci-sandbox/.github/workflows/amd_set_env.sh
            source ~/uccl-ci-sandbox/.venv/bin/activate
            export PYTHONUNBUFFERED=1
            cd ~/uccl-ci-sandbox/ep/bench
            ./run_ep.sh 2 1 ht ${{secrets.UCCL_DEV_AMD_HOST0}} 2>&1 | stdbuf -oL tee ~/uccl-ci-sandbox/ep-ht-host1.log
          EOF
          PID1=$!

          wait -n $PID0 $PID1
          exitcode=$?
          if [ $exitcode -ne 0 ]; then
            kill $PID0 $PID1 2>/dev/null || true
            sleep 1
            kill -9 $PID0 $PID1 2>/dev/null || true
            wait $PID0 $PID1 2>/dev/null || true
            exit $exitcode
          fi
          wait $PID0 $PID1
          exit $?

      - name: Run EP low-latency test
        timeout-minutes: 3
        shell: bash
        run: |
          set -uo pipefail

          ssh -o BatchMode=yes amd0 bash --norc --noprofile << 'EOF' &
            set -euo pipefail
            bash ~/uccl-ci-sandbox/.github/workflows/amd_ensure_idle_gpu.sh
            bash ~/uccl-ci-sandbox/.github/workflows/amd_ensure_ci_venv.sh
            source ~/uccl-ci-sandbox/.github/workflows/amd_set_env.sh
            source ~/uccl-ci-sandbox/.venv/bin/activate
            export PYTHONUNBUFFERED=1
            cd ~/uccl-ci-sandbox/ep/bench
            ./run_ep.sh 2 0 ll ${{secrets.UCCL_DEV_AMD_HOST0}} 2>&1 | stdbuf -oL tee ~/uccl-ci-sandbox/ep-ll-host0.log || true
          EOF
          PID0=$!

          sleep 2

          ssh -o BatchMode=yes amd1 bash --norc --noprofile << 'EOF' &
            set -euo pipefail
            bash ~/uccl-ci-sandbox/.github/workflows/amd_ensure_idle_gpu.sh
            bash ~/uccl-ci-sandbox/.github/workflows/amd_ensure_ci_venv.sh
            source ~/uccl-ci-sandbox/.github/workflows/amd_set_env.sh
            source ~/uccl-ci-sandbox/.venv/bin/activate
            export PYTHONUNBUFFERED=1
            cd ~/uccl-ci-sandbox/ep/bench
            ./run_ep.sh 2 1 ll ${{secrets.UCCL_DEV_AMD_HOST0}} 2>&1 | stdbuf -oL tee ~/uccl-ci-sandbox/ep-ll-host1.log || true
          EOF
          PID1=$!

          count_ep_ll_done() {
            local c0 c1
            c0=$(ssh -o BatchMode=yes amd0 "grep -o 'Dispatch bandwidth:' ~/uccl-ci-sandbox/ep-ll-host0.log 2>/dev/null | wc -l | tr -d ' ' || true")
            c1=$(ssh -o BatchMode=yes amd1 "grep -o 'Dispatch bandwidth:' ~/uccl-ci-sandbox/ep-ll-host1.log 2>/dev/null | wc -l | tr -d ' ' || true")
            c0=${c0:-0}
            c1=${c1:-0}
            echo $((c0 + c1))
          }

          EP_LL_TIMEOUT_SEC=45
          start_ts=$(date +%s)

          while true; do
            done_count=$(count_ep_ll_done)
            if [ "$done_count" -ge 16 ]; then
              echo "EP low-latency reached ${done_count}/16 Dispatch bandwidth lines; stopping runners"
              kill $PID0 $PID1 2>/dev/null || true
              break
            fi

            running=0
            kill -0 $PID0 2>/dev/null && running=1
            kill -0 $PID1 2>/dev/null && running=1
            if [ "$running" -eq 0 ]; then
              break
            fi

            now_ts=$(date +%s)
            if [ $((now_ts - start_ts)) -ge "$EP_LL_TIMEOUT_SEC" ]; then
              echo "EP low-latency timed out after ${EP_LL_TIMEOUT_SEC}s; killing runners"
              kill $PID0 $PID1 2>/dev/null || true
              sleep 1
              kill -9 $PID0 $PID1 2>/dev/null || true
              break
            fi

            sleep 2
          done

          wait $PID0 2>/dev/null || true
          exit0=$?
          wait $PID1 2>/dev/null || true
          exit1=$?

          done_count=$(count_ep_ll_done)
          echo "EP low-latency exit codes: host0=${exit0} host1=${exit1}; found ${done_count}/16 Dispatch bandwidth lines"
          if [ "$done_count" -ge 16 ]; then
            exit 0
          fi
          echo "EP low-latency did not print all Dispatch bandwidth lines"
          exit 1

      - name: Kill stale CI GPU processes
        if: always()
        shell: bash
        run: |
          for host in amd0 amd1; do
            ssh -o BatchMode=yes "$host" bash --norc --noprofile << 'EOF' || true
              for pid in $(rocm-smi --showpids 2>/dev/null | grep -oE "[0-9]+" | sort -nu); do
                [ -d "/proc/$pid" ] || continue
                cwd="$(readlink -f /proc/$pid/cwd 2>/dev/null || true)"
                case "$cwd" in "$HOME/uccl-ci-sandbox"*) kill -9 "$pid" 2>/dev/null || true ;; esac
              done
          EOF
          done

      - name: Fetch remote logs
        if: always()
        shell: bash
        run: |
          set -eu
          for log in build ep-ll-host0 ep-ll-host1 ep-ht-host0 ep-ht-host1; do
            scp -o BatchMode=yes amd0:~/uccl-ci-sandbox/${log}.log ./amd0-${log}.log 2>/dev/null || true
            scp -o BatchMode=yes amd1:~/uccl-ci-sandbox/${log}.log ./amd1-${log}.log 2>/dev/null || true
          done

      - name: Upload log artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: amd-ep-logs
          path: |
            amd0-*.log
            amd1-*.log
          if-no-files-found: warn
