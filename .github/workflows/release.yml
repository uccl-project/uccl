name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v0.0.2) — used for artifact naming in dry-run'
        required: false
        default: 'dry-run'
      dry_run:
        description: 'Dry run — build wheels but skip PyPI publish'
        type: boolean
        default: true

permissions:
  contents: write
  packages: read

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

# ---------------------------------------------------------------------------
# Single wheel containing p2p + ep, per (variant, python_version).
#
#   Variant       target   image               package name     distribution
#   ──────────    ──────   ─────               ────────────     ────────────
#   cuda12        cuda     uccl-builder-cuda    uccl-cu12        PyPI
#   cuda13        cuda13   uccl-builder-cuda13  uccl-cu13        PyPI
#   cuda12+efa    cuda     uccl-builder-efa     uccl-cu12-efa    PyPI
#   cuda13+efa    cuda13   uccl-builder-efa13   uccl-cu13-efa    PyPI
#   rocm          rocm     uccl-builder-rocm    uccl-rocm        extra-index-url
#   therock       therock  uccl-builder-therock uccl-rocm        extra-index-url
#
# × Python 3.10, 3.11, 3.12, 3.13 = 24 wheel jobs + 1 source tarball
# ---------------------------------------------------------------------------

jobs:
  # ==========================================================================
  # Job 1: Build wheel variants
  # ==========================================================================
  build-wheels:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        py_version: ["3.10", "3.11", "3.12", "3.13"]
        variant:
          # CUDA 12
          - name: cu12
            target: cuda
            image_name: uccl-builder-cuda
            package_name: uccl-cu12
            for_pypi: true
            gpu_arch: "8.0+PTX;9.0+PTX"
          # CUDA 13
          - name: cu13
            target: cuda13
            image_name: uccl-builder-cuda13
            package_name: uccl-cu13
            for_pypi: true
            gpu_arch: "8.0+PTX;9.0+PTX"
          # CUDA 12 + EFA
          - name: cu12-efa
            target: cuda
            image_name: uccl-builder-efa
            package_name: uccl-cu12-efa
            is_efa: "1"
            for_pypi: true
            gpu_arch: "8.0+PTX;9.0+PTX"
          # CUDA 13 + EFA
          - name: cu13-efa
            target: cuda13
            image_name: uccl-builder-efa13
            package_name: uccl-cu13-efa
            is_efa: "1"
            for_pypi: true
            gpu_arch: "8.0+PTX;9.0+PTX"
          # ROCm
          - name: rocm
            target: rocm
            image_name: uccl-builder-rocm
            package_name: uccl-rocm
            for_pypi: false
            gpu_arch: "gfx942"
          # TheRock (python-packaged ROCm)
          - name: therock
            target: therock
            image_name: uccl-builder-therock
            package_name: uccl-rocm
            for_pypi: false
            gpu_arch: "gfx942"

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          df -h /

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull pre-built Docker image
        run: |
          FULL_IMAGE="${IMAGE_PREFIX}/${{ matrix.variant.image_name }}:py${{ matrix.py_version }}"
          echo "Pulling ${FULL_IMAGE}..."
          docker pull "${FULL_IMAGE}"
          # Tag with the local name that build.sh expects
          docker tag "${FULL_IMAGE}" "${{ matrix.variant.image_name }}"

      - name: Build wheel
        env:
          SKIP_DOCKER_BUILD: "1"
          IMAGE_NAME: ${{ matrix.variant.image_name }}
          IS_EFA: ${{ matrix.variant.is_efa || '' }}
          TORCH_CUDA_ARCH_LIST: ${{ matrix.variant.gpu_arch }}
          UCCL_PACKAGE_NAME: ${{ matrix.variant.package_name }}
          UCCL_SKIP_LOCAL_VERSION: ${{ matrix.variant.for_pypi && '1' || '0' }}
        run: |
          ./build.sh "${{ matrix.variant.target }}" p2p_ep "${{ matrix.py_version }}"

      - name: Retag wheel with Python/ABI tags
        if: matrix.variant.for_pypi
        run: |
          pip install wheel
          PY_VER_NODOT=$(echo "${{ matrix.py_version }}" | tr -d '.')
          cd "wheelhouse-${{ matrix.variant.target }}"
          for whl in ./*.whl; do
            if [[ -f "$whl" ]]; then
              echo "Retagging $whl -> cp${PY_VER_NODOT}-cp${PY_VER_NODOT}-..."
              python3 -m wheel tags \
                --python-tag "cp${PY_VER_NODOT}" \
                --abi-tag "cp${PY_VER_NODOT}" \
                --remove "$whl"
            fi
          done
          echo "Wheels after retagging:"
          ls -lh ./*.whl

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.variant.name }}-py${{ matrix.py_version }}
          path: wheelhouse-${{ matrix.variant.target }}/*.whl
          if-no-files-found: error

  # ==========================================================================
  # Job 2: Create source tarball (includes submodules)
  # ==========================================================================
  create-source-tarball:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Create source tarball
        run: |
          VERSION=$(grep '__version__' uccl/__init__.py | sed 's/.*"\(.*\)".*/\1/')
          echo "Version: ${VERSION}"

          git archive --format=tar "--prefix=uccl-${VERSION}/" HEAD > "uccl-${VERSION}.tar"

          TARBALL="$(pwd)/uccl-${VERSION}.tar"
          git submodule foreach --recursive \
            "git archive --format=tar --prefix=uccl-${VERSION}/\$sm_path/ HEAD | \
             tar --concatenate --file=\"${TARBALL}\""

          gzip "uccl-${VERSION}.tar"
          ls -lh "uccl-${VERSION}.tar.gz"

      - name: Upload source tarball
        uses: actions/upload-artifact@v4
        with:
          name: source-tarball
          path: uccl-*.tar.gz
          if-no-files-found: error

  # ==========================================================================
  # Job 3: Build uccl meta-package (pure Python, extras → backends)
  # ==========================================================================
  build-meta-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build meta-package wheel
        run: |
          pip install build
          python -m build
          echo "Meta-package wheel:"
          ls -lh dist/

      - name: Upload meta-package artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-meta
          path: dist/*.whl
          if-no-files-found: error

  # ==========================================================================
  # Job 4: Upload all artifacts to GitHub Release
  # ==========================================================================
  upload-release-assets:
    needs: [build-wheels, build-meta-package, create-source-tarball]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: wheel-*

      - name: Download source tarball
        uses: actions/download-artifact@v4
        with:
          name: source-tarball
          path: artifacts/source/

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          echo "Uploading assets to release ${TAG}..."

          find artifacts/ -name '*.whl' -print0 | while IFS= read -r -d '' whl; do
            echo "  Uploading $(basename "$whl")"
            gh release upload "${TAG}" "$whl" --repo "${{ github.repository }}" --clobber
          done

          find artifacts/source/ -name '*.tar.gz' -print0 | while IFS= read -r -d '' tarball; do
            echo "  Uploading $(basename "$tarball")"
            gh release upload "${TAG}" "$tarball" --repo "${{ github.repository }}" --clobber
          done

          echo "Done. All assets uploaded."

  # ==========================================================================
  # Job 5: Publish to PyPI
  #   - uccl meta-package (extras → backends)
  #   - uccl-cu12, uccl-cu13, uccl-cu12-efa, uccl-cu13-efa backend wheels
  #   - ROCm wheels stay on GitHub Releases — users install via:
  #       pip install uccl[rocm] --extra-index-url <url>
  # ==========================================================================
  publish-pypi:
    needs: [build-wheels, build-meta-package]
    if: >
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # OIDC for trusted publishing
    environment:
      name: pypi
    steps:
      - name: Download CUDA wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts/
          pattern: wheel-cu*

      - name: Download meta-package wheel
        uses: actions/download-artifact@v4
        with:
          name: wheel-meta
          path: all-artifacts/meta/

      - name: Collect PyPI wheels
        run: |
          mkdir -p dist/
          find all-artifacts/ -name '*.whl' -exec cp {} dist/ \;
          echo "Wheels to publish:"
          ls -lh dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
